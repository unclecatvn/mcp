name: CI

on:
  pull_request:
  push:
    branches: [master, staging]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  discover:
    name: Discover workspace packages
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - id: set
        name: Build matrix from pnpm-workspace.yaml
        run: |
          matrix=$(pnpm m ls --json --depth=-1 \
            | jq -c '[.[] | select(.name != "mcp-monorepo") | {name: .name, dir: (.path | split("/") | last)}]')
          echo "matrix=$matrix" >> "$GITHUB_OUTPUT"
          echo "Discovered packages: $matrix"

  test:
    name: test (${{ matrix.package.dir }}, node-${{ matrix.node }})
    needs: discover
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        package: ${{ fromJSON(needs.discover.outputs.matrix) }}
        node: [20, 22]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter "${{ matrix.package.name }}" lint
      - run: pnpm --filter "${{ matrix.package.name }}" format
      - run: pnpm --filter "${{ matrix.package.name }}" test:coverage
      - name: Upload coverage to Codecov
        if: matrix.node == '22'
        uses: codecov/codecov-action@v4
        with:
          files: ${{ matrix.package.dir }}/coverage/lcov.info
          flags: ${{ matrix.package.dir }}
          fail_ci_if_error: false

  audit:
    name: audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm audit --audit-level=high

  ci-success:
    name: ci-success
    if: always()
    needs: [discover, test, audit]
    runs-on: ubuntu-latest
    steps:
      - name: Fail if any required job failed
        if: contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled')
        run: |
          echo "One or more required jobs failed:"
          echo "  discover: ${{ needs.discover.result }}"
          echo "  test:     ${{ needs.test.result }}"
          echo "  audit:    ${{ needs.audit.result }}"
          exit 1
      - name: All required jobs succeeded
        run: echo "CI passed for all packages."
