name: CI
on:
  pull_request:
  push:
    branches: [master]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  detect:
    runs-on: ubuntu-latest
    outputs:
      db: ${{ steps.filter.outputs.db }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            db:
              - 'db/**'
              - 'pnpm-workspace.yaml'
              - 'package.json'
              - 'eslint.config.js'
              - '.prettierrc.json'
              - '.github/workflows/ci.yml'

  db:
    needs: detect
    if: needs.detect.outputs.db == 'true'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node: [18, 20, 22]
      fail-fast: false
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @unclecat/mcp-multi-db lint
      - run: pnpm --filter @unclecat/mcp-multi-db format
      - run: pnpm --filter @unclecat/mcp-multi-db test:coverage
      - uses: codecov/codecov-action@v4
        if: matrix.node == '20'
        with:
          files: db/coverage/lcov.info
          flags: db
          fail_ci_if_error: false

  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm audit --audit-level=high
        continue-on-error: false
