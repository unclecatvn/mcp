name: Release
on:
  push:
    branches: [master]

concurrency:
  group: release-${{ github.ref }}

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          registry-url: "https://registry.npmjs.org"
      - run: pnpm install --frozen-lockfile
      - name: Quality gate before publish
        run: |
          pnpm --filter @unclecat/mcp-multi-db lint
          pnpm --filter @unclecat/mcp-multi-db format
          pnpm --filter @unclecat/mcp-multi-db test
          pnpm audit --audit-level=high
      - name: Verify npm auth
        run: npm whoami
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      - id: changesets
        uses: changesets/action@v1
        with:
          publish: pnpm release
          createGithubReleases: false
          commit: "chore(release): version packages"
          title: "chore(release): version packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      - name: Create GitHub Release (SemVer tag)
        if: steps.changesets.outputs.published == 'true'
        run: |
          VERSION=$(node -e "const fs=require('fs'); const p=JSON.parse(fs.readFileSync('./db/package.json','utf8')); process.stdout.write(p.version)")
          TAG="v${VERSION}"
          NOTES="$(cat <<EOF
          ## Highlights
          - Automated release for ${TAG}.

          ## Package
          - \`@unclecat/mcp-multi-db@${VERSION}\`

          ## Verification
          - Published via Changesets release workflow.
          - npm authentication verified with \`npm whoami\`.

          ## Links
          - Package: https://www.npmjs.com/package/@unclecat/mcp-multi-db
          - Commit: https://github.com/${GITHUB_REPOSITORY}/commit/${GITHUB_SHA}
          EOF
          )"
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release edit "$TAG" \
              --title "Release ${TAG}" \
              --notes "$NOTES"
          else
            gh release create "$TAG" \
              --title "Release ${TAG}" \
              --notes "$NOTES" \
              --target "${GITHUB_SHA}"
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
