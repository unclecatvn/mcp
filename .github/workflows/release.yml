name: Release

on:
  push:
    branches: [master]

concurrency:
  group: release-${{ github.ref }}

jobs:
  release:
    name: Release packages
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      id-token: write # Required for npm Trusted Publishers (OIDC)
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history needed for changeset diff detection

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Upgrade npm CLI (≥11.5.1 required for Trusted Publishers OIDC)
        run: npm install -g npm@latest

      - run: pnpm install --frozen-lockfile

      - name: Quality gate (all packages)
        run: |
          pnpm -r lint
          pnpm -r format
          pnpm -r test
          pnpm audit --audit-level=high

      - name: Auto-generate changeset for packages with code changes
        run: |
          set -euo pipefail

          # Skip if this commit IS a version-bump from changesets/action (avoid loop)
          if [[ "$(git log -1 --pretty=%s)" == "chore(release): version packages" ]]; then
            echo "Version bump commit — skipping auto-generation"
            exit 0
          fi

          # Skip if any pending changeset already exists (manual or prior auto)
          if find .changeset -maxdepth 1 -name '*.md' ! -name 'README.md' | grep -q .; then
            echo "Pending changeset(s) found — skipping auto-generation"
            exit 0
          fi

          # Detect changed workspace packages between this commit and its first parent
          base=$(git rev-parse HEAD^1)
          changed_dirs=$(git diff --name-only "$base" HEAD \
            | awk -F/ '$1=="db" || $1=="odoo" {print $1}' \
            | sort -u)

          if [ -z "$changed_dirs" ]; then
            echo "No workspace package files changed — no release this run"
            exit 0
          fi

          short_sha=$(git rev-parse --short HEAD)
          summary=$(git log -1 --pretty=%s)
          file=".changeset/auto-${short_sha}.md"

          {
            echo "---"
            for dir in $changed_dirs; do
              pkg_name=$(node -p "require('./${dir}/package.json').name")
              echo "\"${pkg_name}\": patch"
            done
            echo "---"
            echo ""
            echo "$summary"
          } > "$file"

          echo "=== Generated $file ==="
          cat "$file"

      - id: changesets
        uses: changesets/action@v1
        with:
          publish: pnpm release
          createGithubReleases: true
          commit: "chore(release): version packages"
          title: "chore(release): version packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # No NPM_TOKEN / NODE_AUTH_TOKEN — npm Trusted Publishers uses OIDC.
          NPM_CONFIG_PROVENANCE: "true"

      - name: Enable auto-merge on Version Packages PR
        if: steps.changesets.outputs.pullRequestNumber != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr merge ${{ steps.changesets.outputs.pullRequestNumber }} \
            --squash --auto --repo ${{ github.repository }} \
            || echo "::warning::auto-merge could not be enabled (repo settings may not allow it). Merge the Version Packages PR manually."
